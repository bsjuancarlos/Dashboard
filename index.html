<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Finanzas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 20px;
}

h1 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    margin-bottom: 10px;
}

button {
    padding: 10px 20px;
    background: #2d3436;
    color: white;
    border: none;
    cursor: pointer;
}

.tabs {
    margin-top: 20px;
}

.tab {
    display: inline-block;
    padding: 10px;
    background: #dfe6e9;
    margin-right: 5px;
    cursor: pointer;
}

.tab.active {
    background: #0984e3;
    color: white;
}

.cards {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    flex: 1;
    padding: 20px;
    color: white;
    border-radius: 8px;
    text-align: center;
}

.ingresos { background: #27ae60; }
.gastos { background: #e74c3c; }
.balance { background: #2980b9; }

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

canvas {
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>Dashboard Finanzas</h1>

<textarea id="inputData" placeholder="Pegá acá los datos del Google Sheet"></textarea>
<br>
<button onclick="procesar()">Actualizar</button>

<div id="tabs" class="tabs"></div>

<div class="cards">
    <div class="card ingresos" id="ingresos"></div>
    <div class="card gastos" id="gastos"></div>
    <div class="card balance" id="balance"></div>
</div>

<canvas id="grafico"></canvas>

<table id="tabla"></table>

<script>
let dataGlobal = [];
let chart;

function limpiarNumero(valor) {
    if (!valor) return 0;
    return parseFloat(valor.toString().replace(/\./g, "").replace(",", ".")) || 0;
}

function procesarTexto(texto) {
    return texto.trim().split("\n").map(fila =>
        fila.split("\t").map(c =>
            c.replace(/\n/g, " ").replace(/"/g, "").trim()
        )
    );
}

function procesar() {
    const texto = document.getElementById("inputData").value;
    const data = procesarTexto(texto);
    localStorage.setItem("data", JSON.stringify(data));
    init(data);
}

function init(data) {
    dataGlobal = data;

    const meses = data[0].slice(1).map(m => m.replace(/\n/g, " ").trim());

    const tabs = document.getElementById("tabs");
    tabs.innerHTML = "";

    meses.forEach((mes, i) => {
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.innerText = mes;

        tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderMes(i + 1);
        };

        tabs.appendChild(tab);
    });

    tabs.children[0].click();
}

function renderMes(index) {
    let ingresos = 0;
    let gastos = 0;
    let categorias = [];

    for (let i = 1; i < dataGlobal.length; i++) {
        const nombre = dataGlobal[i][0];
        const valor = limpiarNumero(dataGlobal[i][index]);

        if (!nombre) continue;

        if (nombre === "Ingresos") ingresos = valor;
        else if (nombre === "Gastos") gastos = valor;
        else if (nombre !== "TOTAL" && valor !== 0) {
            categorias.push({ nombre, valor: Math.abs(valor) });
        }
    }

    categorias = categorias.sort((a,b) => b.valor - a.valor);

    document.getElementById("ingresos").innerText = "Ingresos\n$" + ingresos.toLocaleString();
    document.getElementById("gastos").innerText = "Gastos\n$" + gastos.toLocaleString();
    document.getElementById("balance").innerText = "Balance\n$" + (ingresos + gastos).toLocaleString();

    // tabla
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    categorias.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${c.nombre}</td><td>$${c.valor.toLocaleString()}</td>`;
        tabla.appendChild(tr);
    });

    // gráfico
    const ctx = document.getElementById("grafico");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: categorias.map(c => c.nombre),
            datasets: [{
                label: "Gastos",
                data: categorias.map(c => c.valor)
            }]
        }
    });
}

// cargar guardado
const saved = localStorage.getItem("data");
if (saved) {
    init(JSON.parse(saved));
}
</script>

</body>
</html>
