<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Finanzas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        
        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 30px;
        }
        
        .header-left h1 {
            font-size: 32px;
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .header-left p {
            color: #666;
            font-size: 14px;
        }
        
        .header-right {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #667eea;
            flex: 0 0 400px;
        }
        
        .header-right h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header-right p {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .header-right textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }
        
        .header-right button {
            margin-top: 10px;
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        
        .header-right button:hover {
            background: #5568d3;
        }
        
        .success-message, .error-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
        }
        
        .month-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }
        
        .month-tab {
            padding: 10px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .month-tab:hover {
            color: #667eea;
        }
        
        .month-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .metric-card {
            background: #667eea;
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .metric-card.ingresos {
            background: #10b981;
        }
        
        .metric-card.gasto {
            background: #ef4444;
        }
        
        .metric-card.balance {
            background: #f59e0b;
        }
        
        .metric-card.balance-positivo {
            background: #3b82f6;
        }
        
        .metric-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .metric-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .charts-and-table {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .chart-wrapper {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .chart-canvas {
            position: relative;
            height: 300px;
        }
        
        .table-wrapper {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        
        .table-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tbody tr:hover {
            background: #f0f0f0;
        }
        
        tbody tr:nth-child(even) {
            background: #fafafa;
        }
        
        .category-name {
            font-weight: 500;
            color: #333;
        }
        
        .amount {
            text-align: right;
            font-weight: 600;
            color: #ef4444;
            white-space: nowrap;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>💰 Dashboard Finanzas</h1>
                <p>Resumen de ingresos y gastos</p>
            </div>
            <div class="header-right">
                <h3>📋 Actualizar datos</h3>
                <p>Ctrl+A en tu Sheet, Ctrl+C, pega aquí:</p>
                <textarea id="pasteArea" placeholder="Pega aquí..."></textarea>
                <button onclick="procesarDatos()">Actualizar</button>
                <div class="success-message" id="successMsg">✅ Datos actualizados</div>
                <div class="error-message" id="errorMsg"></div>
            </div>
        </div>
        
        <div class="month-tabs" id="monthTabs"></div>
        <div class="metrics" id="metricsContainer"></div>
        
        <div class="charts-and-table">
            <div class="chart-wrapper">
                <div class="chart-title">📊 Ingresos vs Gastos</div>
                <div class="chart-canvas">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
            
            <div class="chart-wrapper">
                <div class="chart-title">📊 Gastos por Categoría</div>
                <div class="chart-canvas">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="table-wrapper">
                <div class="table-title">📋 Gastos</div>
                <table>
                    <thead>
                        <tr>
                            <th>Categoría</th>
                            <th style="text-align: right;">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="2" class="no-data">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let rawData = [];
        let months = [];
        let currentMonth = null;
        let charts = {};
        
        function parseNumber(str) {
            if (!str) return 0;
            str = String(str).trim();
            str = str.replace(/"/g, '').replace(/\n/g, '').replace(/\s+/g, '');
            if (str === '-0' || str === '0' || str === '') return 0;
            str = str.replace(/\./g, '');
            const num = parseFloat(str);
            return isNaN(num) ? 0 : num;
        }
        
        function cargarDatos() {
            const saved = localStorage.getItem('dashboardData');
            if (saved) {
                try {
                    rawData = JSON.parse(saved);
                    processData();
                    renderUI();
                    if (months.length > 0) selectMonth(months[0].name);
                } catch (e) {
                    console.error('Error cargando datos:', e);
                }
            }
        }
        
        function procesarDatos() {
            const texto = document.getElementById('pasteArea').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!texto.trim()) { 
                errorMsg.textContent = '❌ Pega los datos';
                errorMsg.style.display = 'block';
                return; 
            }
            
            try {
                const filas = texto.trim().split('\n');
                rawData = filas.map(fila => {
                    let celdas = fila.split('\t');
                    // Remover primer celda vacía si existe
                    if (celdas[0].trim() === '') {
                        celdas = celdas.slice(1);
                    }
                    return celdas;
                });
                
                // Filtrar filas vacías
                rawData = rawData.filter(row => row.some(cell => cell.trim() !== ''));
                
                localStorage.setItem('dashboardData', JSON.stringify(rawData));
                successMsg.style.display = 'block';
                setTimeout(() => successMsg.style.display = 'none', 3000);
                document.getElementById('pasteArea').value = '';
                
                processData();
                renderUI();
                if (months.length > 0) selectMonth(months[0].name);
                
            } catch (e) {
                errorMsg.textContent = '❌ Error: ' + e.message;
                errorMsg.style.display = 'block';
            }
        }
        
        function processData() {
            let ingIdx = -1, gasIdx = -1;
            
            for (let i = 0; i < rawData.length; i++) {
                const firstCell = String(rawData[i][0]).trim();
                if (firstCell === 'Ingresos') ingIdx = i;
                if (firstCell === 'Gastos') gasIdx = i;
            }
            
            if (ingIdx === -1 || gasIdx === -1) {
                months = [];
                return;
            }
            
            months = [];
            
            const ingresosRow = rawData[ingIdx];
            const gastosRow = rawData[gasIdx];
            
            // Lista de meses en orden
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                               'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            // Primero: extraer todos los nombres de meses del header, en orden
            const foundMonths = [];
            for (let i = 0; i < ingIdx; i++) {
                for (let col = 0; col < rawData[i].length; col++) {
                    const cell = String(rawData[i][col]).trim().replace(/"/g, '').replace(/\n/g, ' ').trim();
                    for (let m of monthNames) {
                        if (cell.includes(m) && !foundMonths.find(x => x === m)) {
                            foundMonths.push(m);
                            console.log(`Encontrado mes: ${m}`);
                        }
                    }
                }
            }
            
            console.log('Meses encontrados en header:', foundMonths);
            
            // Ahora recorrer columnas de datos
            let monthIndex = 0;
            for (let col = 0; col < Math.max(ingresosRow.length, gastosRow.length); col++) {
                const ing = parseNumber(ingresosRow[col] || '');
                const gas = parseNumber(gastosRow[col] || '');
                
                // Si tiene ingresos o gastos, es una columna de mes válida
                if (ing !== 0 || gas !== 0) {
                    let monthName = '';
                    
                    // Usar el mes encontrado en orden
                    if (monthIndex < foundMonths.length) {
                        monthName = foundMonths[monthIndex] + ' 2026';
                    } else {
                        monthName = `Mes ${col}`;
                    }
                    
                    months.push({ name: monthName, col });
                    console.log(`Col ${col}: "${monthName}" | Ing: ${ing} | Gas: ${gas}`);
                    monthIndex++;
                }
            }
            
            console.log('Meses finales:', months);
        }
        
        function renderUI() {
            document.getElementById('monthTabs').innerHTML = months
                .map(m => `<button class="month-tab" onclick="selectMonth('${m.name}')">${m.name}</button>`).join('');
        }
        
        function selectMonth(name) {
            currentMonth = months.find(m => m.name === name);
            if (!currentMonth) return;
            document.querySelectorAll('.month-tab').forEach(b => 
                b.classList.toggle('active', b.textContent.trim() === name)
            );
            renderDashboard();
        }
        
        function renderDashboard() {
            let ingIdx = rawData.findIndex(r => r[0].trim() === 'Ingresos');
            let gasIdx = rawData.findIndex(r => r[0].trim() === 'Gastos');
            
            if (ingIdx === -1 || gasIdx === -1) return;
            
            const col = currentMonth.col;
            const ing = parseNumber(rawData[ingIdx][col]);
            const gas = Math.abs(parseNumber(rawData[gasIdx][col]));
            const bal = ing - gas;
            
            const cats = [];
            for (let i = gasIdx + 1; i < rawData.length; i++) {
                const name = rawData[i][0].trim();
                const amt = Math.abs(parseNumber(rawData[i][col]));
                
                if (name && !['TOTAL', 'Ahorro', 'Deudas', 'Carlos', 'Venezuela', ''].includes(name) && amt > 0) {
                    cats.push({ name, amount: amt });
                }
            }
            
            renderMetrics(ing, gas, bal);
            renderCharts(ing, gas, cats);
            renderTable(cats);
        }
        
        function renderMetrics(ing, gas, bal) {
            const balanceClass = bal >= 0 ? 'balance-positivo' : 'balance';
            document.getElementById('metricsContainer').innerHTML = `
                <div class="metric-card ingresos">
                    <div class="metric-label">💵 Ingresos</div>
                    <div class="metric-value">$${ing.toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</div>
                </div>
                <div class="metric-card gasto">
                    <div class="metric-label">💸 Gastos</div>
                    <div class="metric-value">$${gas.toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</div>
                </div>
                <div class="metric-card ${balanceClass}">
                    <div class="metric-label">${bal >= 0 ? '✅' : '⚠️'} Balance</div>
                    <div class="metric-value">$${bal.toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</div>
                </div>
            `;
        }
        
        function renderCharts(ing, gas, cats) {
            Object.values(charts).forEach(c => {
                try { c.destroy(); } catch(e) {}
            });
            charts = {};
            
            charts.comp = new Chart(document.getElementById('comparisonChart'), {
                type: 'bar',
                data: { 
                    labels: ['Ingresos', 'Gastos'], 
                    datasets: [{ 
                        data: [ing, gas], 
                        backgroundColor: ['#10b981', '#ef4444'], 
                        borderRadius: 8 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            ticks: { callback: v => '$' + v.toLocaleString('es-AR') } 
                        } 
                    } 
                }
            });
            
            const sorted = [...cats].sort((a, b) => b.amount - a.amount);
            const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#06b6d4', '#6366f1', '#f97316', '#14b8a6', '#d946ef'];
            
            charts.bar = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { 
                    labels: sorted.map(c => c.name), 
                    datasets: [{ 
                        data: sorted.map(c => c.amount), 
                        backgroundColor: colors.slice(0, sorted.length), 
                        borderRadius: 6 
                    }] 
                },
                options: { 
                    indexAxis: 'y', 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        x: { 
                            beginAtZero: true,
                            ticks: { callback: v => '$' + v.toLocaleString('es-AR') } 
                        } 
                    } 
                }
            });
        }
        
        function renderTable(cats) {
            const tbody = document.getElementById('tableBody');
            if (cats.length === 0) { 
                tbody.innerHTML = '<tr><td colspan="2" class="no-data">Sin datos</td></tr>'; 
                return; 
            }
            tbody.innerHTML = cats.sort((a, b) => b.amount - a.amount).map(c => 
                `<tr><td class="category-name">${c.name}</td><td class="amount">$${c.amount.toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td></tr>`
            ).join('');
        }
        
        cargarDatos();
    </script>
</body>
</html>
